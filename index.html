<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ئەلبومێکی پڕ لە یادگاری ئەشقەکەمان</title>
    <!-- Google Font & Font Awesome for icons -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cairo:wght@300;400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a0b0b 0%, #2d1414 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cairo', 'Playfair Display', serif;
            padding: 1.5rem;
        }

        .album-container {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 240, 235, 0.1);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 48px 48px 48px 48px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 200, 180, 0.15);
            padding: 2.5rem 2rem;
            border: 1px solid rgba(255, 200, 180, 0.2);
            transition: all 0.3s ease;
        }

        /* header عاشقانه */
        .love-header {
            text-align: center;
            margin-bottom: 2.8rem;
            position: relative;
        }

        .love-header h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 3.2rem;
            color: #f5e3d4;
            text-shadow: 0 0 15px rgba(255, 150, 130, 0.6), 0 4px 20px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
            word-spacing: 4px;
        }

        .love-header h1 i {
            color: #ffb3a0;
            margin: 0 10px;
            animation: pulseHeart 2s infinite;
        }

        .love-header .sub-love {
            font-size: 1.1rem;
            color: #dbb8a8;
            background: rgba(70, 30, 30, 0.5);
            display: inline-block;
            padding: 0.4rem 2.2rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 180, 150, 0.3);
            margin-top: 8px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .sub-love i {
            color: #ff9f8a;
            margin: 0 6px;
        }

        /* زرێکی جوان */
        .btn-open-album {
            background: linear-gradient(135deg, #a64d4d, #7a2e2e);
            border: none;
            padding: 1rem 3rem;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff0e6;
            box-shadow: 0 8px 25px rgba(180, 70, 50, 0.5);
            cursor: pointer;
            transition: 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 14px;
            border: 1px solid rgba(255, 200, 170, 0.3);
            margin-top: 0.5rem;
            font-family: 'Cairo', sans-serif;
        }

        .btn-open-album i {
            font-size: 1.8rem;
            color: #ffd9c4;
        }

        .btn-open-album:hover {
            transform: scale(1.04) translateY(-4px);
            background: linear-gradient(135deg, #b85a5a, #8a3838);
            box-shadow: 0 14px 35px rgba(200, 80, 60, 0.7);
            letter-spacing: 2px;
        }

        .btn-open-album:active {
            transform: scale(0.97);
        }

        /* دەفتەر / ئەلبومەکە */
        .album-book {
            margin-top: 2.5rem;
            background: rgba(35, 18, 15, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 48px 48px 24px 24px;
            padding: 1.8rem 0.8rem 2.2rem 0.8rem;
            border: 1px solid rgba(255, 210, 185, 0.15);
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.6), 0 20px 40px rgba(0, 0, 0, 0.5);
            display: none; /* initial hidden */
            animation: fadeBook 0.9s ease;
        }

        .album-book.open {
            display: block;
        }

        @keyframes fadeBook {
            0% { opacity: 0; transform: translateY(30px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ناوی دەفتەرەکە */
        .book-title {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            color: #f3dacb;
            text-align: center;
            font-size: 2rem;
            border-bottom: 2px dashed #b28574;
            padding-bottom: 0.7rem;
            margin: 0 0.5rem 1.8rem 0.5rem;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(255, 130, 100, 0.3);
        }

        .book-title i {
            color: #e6a18b;
            margin: 0 12px;
        }

        /* گالری وێنەکان (لاپەرەکان) */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 1.6rem;
            justify-content: center;
            padding: 0.2rem 0.5rem;
        }

        .photo-card {
            background: rgba(44, 24, 20, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 180, 150, 0.1);
            transition: all 0.25s ease;
            cursor: pointer;
            transform: scale(1);
            border: 1px solid rgba(200, 130, 100, 0.2);
            aspect-ratio: 1 / 1.2;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .photo-card:hover {
            transform: scale(1.03) translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 2px rgba(255, 180, 150, 0.3);
            border-color: #dba48a;
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: 0.3s;
            background: #281b17;
        }

        .photo-card img::after {
            content: "✨";
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 1.8rem;
            opacity: 0.3;
        }

        /* بەشێک بۆ ئەگەر وێنە نیە */
        .photo-card .placeholder-icon {
            font-size: 3.2rem;
            color: #7a5448;
            background: #2e1a15;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.6;
        }

        /* فۆتەر بچووک */
        .footer-love {
            margin-top: 2.4rem;
            text-align: center;
            color: #b58d7c;
            font-size: 0.9rem;
            letter-spacing: 1px;
            border-top: 1px solid rgba(255, 180, 150, 0.1);
            padding-top: 1.5rem;
        }

        .footer-love i {
            color: #e07b5e;
            margin: 0 4px;
        }

        @keyframes pulseHeart {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); text-shadow: 0 0 20px #ff8a70; }
            100% { transform: scale(1); }
        }

        /* responsive */
        @media (max-width: 600px) {
            .love-header h1 {
                font-size: 2.2rem;
            }
            .btn-open-album {
                font-size: 1.2rem;
                padding: 0.8rem 1.8rem;
            }
            .photo-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 1rem;
            }
            .album-container {
                padding: 1.5rem 1rem;
            }
        }
        @media (max-width: 450px) {
            .photo-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="album-container">
        <!-- سەرتایەکی ئاشقانە -->
        <div class="love-header">
            <h1>
                <i class="fas fa-heart"></i>
                ئەلبومێکی پڕ لە یادگاری ئەشقەکەمان
                <i class="fas fa-heart"></i>
            </h1>
            <div class="sub-love">
                <i class="fas fa-infinity"></i> 
                هەر وێنەیەک چیرۆکێکە لە دڵەوە 
                <i class="fas fa-infinity"></i>
            </div>
            <br />
            <!-- کلیک بکە بۆ بینینی ئەلبومەکە -->
            <button class="btn-open-album" id="openAlbumBtn">
                <i class="fas fa-book-open"></i>
                کلیک بکە بۆ بینینی ئەلبومەکە
                <i class="fas fa-arrow-left"></i>
            </button>
        </div>

        <!-- دەفتەری ئاشقانە -->
        <div class="album-book" id="albumBook">
            <div class="book-title">
                <i class="fas fa-camera-retro"></i>
                گەنجینەی ئەلبومەکە
                <i class="fas fa-camera-retro"></i>
            </div>

            <!-- تۆڕی وێنەکان (هەمووی لە ریپۆستەرەوە) -->
            <div class="photo-grid" id="photoGrid">
                <!-- وێنەکان بە شێوەی داینامیک لە ژێرەوە پڕ دەکرێتەوە -->
            </div>
        </div>

        <div class="footer-love">
            <i class="fas fa-heart"></i> 
            بۆ هەموو خۆشەویستییەک کە وێنەی تێدایە 
            <i class="fas fa-heart"></i>
        </div>
    </div>

    <script>
        (function() {
            // هەموو وێنەکانی ریپۆستەرەکە (لەسەر بنەمای فایلەکانی گیتهۆب)
            // ئەم ناوانە وەک لە وێنەکەدا هاتووە (هەمووی)
            const imageFiles = [
                "4B28EFBF-54E7-45EA-8A1...",
                "6000B0A4-B57B-4981-B10...",
                "71F3244A-0559-4C56-A4F...",
                "7433172290352266552.mov",
                "A8C88C7E-0488-4891-849...",
                "IMG_7032.JPG",
                "IMG_8076.JPG",
                "IMG_8077.JPG",
                "IMG_8078.JPG",
                "IMG_8079.JPG"
            ];

            // فەرمانی نمایشکردنی وێنەکان (لاپەرەکان)
            const grid = document.getElementById('photoGrid');
            const albumBook = document.getElementById('albumBook');
            const openBtn = document.getElementById('openAlbumBtn');

            // وێنەکان بە شێوەی کارتی جوان پڕ بکە
            function renderImages() {
                grid.innerHTML = ''; // خالی بکەوە

                if (imageFiles.length === 0) {
                    // ئەگەر هیچ وێنەیەک نەبوو
                    const emptyMsg = document.createElement('div');
                    emptyMsg.style.gridColumn = '1 / -1';
                    emptyMsg.style.textAlign = 'center';
                    emptyMsg.style.color = '#b58d7c';
                    emptyMsg.style.padding = '3rem 0';
                    emptyMsg.style.fontSize = '1.3rem';
                    emptyMsg.innerHTML = '<i class="fas fa-heart-broken"></i>  هێشتا وێنەیەک نیە  <i class="fas fa-heart-broken"></i>';
                    grid.appendChild(emptyMsg);
                    return;
                }

                // بۆ هەر وێنەیەک کارتێک دروست بکە
                imageFiles.forEach((fileName, index) => {
                    const card = document.createElement('div');
                    card.className = 'photo-card';

                    // هەوڵبدە وێنەکە بار بکەیت (لە گیتهۆبەوە)
                    // بۆ نمونە لەسەر ڕێڕەوی ڕاستەقینەی گیتهۆب: 
                    // https://raw.githubusercontent.com/rayan-farzad/rayan-farzad.vercel.app/main/IMAGE_NAME
                    // بەڵام لەم دەموویەدا بە شێوەی پلەهۆڵدەر (ئیکۆن) نمایش دەکەین 
                    // چونکە ڕێڕەوی ڕاستەقینە پێویستە بە شێوەی دروست.
                    // بەڵام بۆ نمایشی جوانی وێنەکان، URLێکی گرافیکی بەکاردەهێنین کە ڕەنگی جوانی هەیە
                    // هەروەها ناوی وێنەکە لەسەر کارتەکە دەردەکەوێت.

                    const img = document.createElement('img');
                    // بۆ ئەم دەموویە، لە وێنەی ڕاستەقینە سوود وەردەگرین بە بەکارهێنانی placeholder service 
                    // بەڵام بۆ بینینی جوانی، ڕەنگ و شێوەی جیاواز بەکاردەهێنین بۆ هەر وێنەیەک
                    const randomColor = `https://picsum.photos/seed/${index + 100}/300/400`; 
                    // لەم شوێنەدا وێنەی ڕاستەقینەی گیتهۆب دادەنێین (بەڵام چونکە ڕێڕەوەکانیان ڕاست نیە، بەم شێوەیە خۆمان ڕێکدەکەین)
                    // بەڵام بۆ نمایشێکی نزیک لە ڕاستی، من لە URLی گیتهۆب بەکاردێنم بەڵام لەوانەیە شکست بهێنێت.
                    // لەبری ئەوە، بۆ دەموو، وێنەی ڕاستەقینەی گیتهۆب بەکارناهێنم چونکە دەستڕاگەیشتن نیە بۆ ڕاستەقینە.
                    // بەڵام بەم شێوەیە هەموو وێنەکان بە جوانی دەردەکەون و ناویان لەسەرە.
                    
                    // بۆ بینینی جوانی زیاتر، هەر وێنەیەک بە شێوەی کارتی جوان لەگەڵ ناوەکەی
                    img.src = `https://picsum.photos/seed/${fileName.length + index}/300/400`;
                    img.alt = fileName;
                    img.loading = 'lazy';
                    
                    // ناوی وێنەکە لەسەر کارتەکە (بە شێوەیەکی ئاشقانە)
                    const overlay = document.createElement('div');
                    overlay.style.position = 'absolute';
                    overlay.style.bottom = '8px';
                    overlay.style.left = '8px';
                    overlay.style.right = '8px';
                    overlay.style.background = 'rgba(20, 8, 5, 0.7)';
                    overlay.style.backdropFilter = 'blur(6px)';
                    overlay.style.borderRadius = '40px';
                    overlay.style.padding = '0.4rem 0.8rem';
                    overlay.style.fontSize = '0.7rem';
                    overlay.style.color = '#f0d5c4';
                    overlay.style.textAlign = 'center';
                    overlay.style.fontWeight = '300';
                    overlay.style.border = '1px solid rgba(255,180,150,0.2)';
                    overlay.style.whiteSpace = 'nowrap';
                    overlay.style.overflow = 'hidden';
                    overlay.style.textOverflow = 'ellipsis';
                    overlay.style.maxWidth = '90%';
                    overlay.style.margin = '0 auto';
                    overlay.textContent = fileName.length > 18 ? fileName.slice(0, 16) + '…' : fileName;

                    card.appendChild(img);
                    card.appendChild(overlay);
                    grid.appendChild(card);
                });
            }

            // کلیک کردن بۆ کردنەوەی دەفتەرەکە
            openBtn.addEventListener('click', function(e) {
                e.preventDefault();
                // ئەگەر دەفتەرەکە کراوە بێت، داخراوە بکە (بۆ دووبارە کردنەوە)
                if (albumBook.classList.contains('open')) {
                    albumBook.classList.remove('open');
                    // ناوی دوگمە بگۆڕە
                    openBtn.innerHTML = `<i class="fas fa-book-open"></i> کلیک بکە بۆ بینینی ئەلبومەکە <i class="fas fa-arrow-left"></i>`;
                } else {
                    // پێش کردنەوە، دڵنیابە وێنەکان پڕکراون
                    renderImages();
                    albumBook.classList.add('open');
                    openBtn.innerHTML = `<i class="fas fa-book-open"></i> داخستنی ئەلبوم <i class="fas fa-arrow-left"></i>`;

                    // خۆکار گۆرانییەکە لە یوتیوب کار بکات (لە run کردن)
                    playYouTubeAudio();
                }
            });

            // فەنکشنی گۆرانی خۆکار (لەکاتی run کردن)
            function playYouTubeAudio() {
                // بە شێوەی iframe یان پەنجەرەی نوێ یان ئۆدیۆ
                // بەڵام باشترە بە شێوەی iframe لە پشتەوە
                const existingIframe = document.getElementById('youtubeAudioIframe');
                if (existingIframe) {
                    // ئەگەر هەیە، دەستکاری بکە یان نوێ بکەوە
                    existingIframe.src = existingIframe.src; // reload
                    return;
                }
                const iframe = document.createElement('iframe');
                iframe.id = 'youtubeAudioIframe';
                iframe.width = '0';
                iframe.height = '0';
                iframe.src = 'https://www.youtube.com/embed/BAlG6zmNi2w?si=2ltCYZwzZaeOA71H&autoplay=1&loop=1&playlist=BAlG6zmNi2w';
                iframe.title = 'YouTube audio';
                iframe.style.position = 'absolute';
                iframe.style.opacity = '0';
                iframe.style.pointerEvents = 'none';
                iframe.style.width = '1px';
                iframe.style.height = '1px';
                document.body.appendChild(iframe);
                // هەروەها بە شێوەی autoplay
            }

            // لە سەرەتاوە وێنەکان پڕ بکە (بەڵام دەفتەر داخراوە)
            // بۆ ئەوەی کاتێک کلیک دەکەیت خێرا دەربچێت
            renderImages();

            // هەروەها لە کاتی بارکردنی لاپەرەکە گۆرانییەکە کاربکات (خۆکار)
            window.addEventListener('load', function() {
                // بە دواکەوتوویی بۆ ئەوەی براوزەر ڕێگە بدات
                setTimeout(() => {
                    playYouTubeAudio();
                }, 400);
            });

            // هەروەها ئەگەر بەکارهێنەر دەفتەرەکەی کردەوە، گۆرانییەکە هەر کاردەکات

            // تا ئێستا هیچ وێنەیەک لەبیر نەکەین، هەموویان لە imageFiles هاتوون
            // لەوانەیە بەکارهێنەر بیەوێت وێنەکان ببینێت، بۆیە دوگمەکەش کراوەیە

        })();
    </script>
</body>
</html>
