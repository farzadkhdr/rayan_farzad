<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ئەلبوومی رەیان - چاو زەیتوونەکەم</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Naskh Arabic', serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* ستارەکانی پشتە */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* دڵە هەڵاوساوەکان */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .floating-heart {
            position: absolute;
            color: rgba(255, 105, 180, 0.3);
            font-size: 20px;
            animation: floatUp 8s linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) rotate(360deg) scale(1.5);
                opacity: 0;
            }
        }

        /* کەنتێنەری سەرەکی */
        .main-container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 20px;
        }

        /* شاشەی بەخێرهاتن */
        .welcome-screen {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            transition: all 0.8s ease;
            position: relative;
            overflow: hidden;
        }

        .welcome-screen::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.1) 0%, transparent 50%);
            animation: rotateGradient 10s linear infinite;
        }

        @keyframes rotateGradient {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .welcome-screen.hidden {
            opacity: 0;
            transform: scale(0.8) translateY(-30px);
            pointer-events: none;
        }

        .title {
            font-size: 3em;
            font-weight: 700;
            color: #ff69b4;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.5), 0 0 40px rgba(255, 105, 180, 0.3);
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
            animation: glowText 2s ease-in-out infinite;
        }

        @keyframes glowText {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 105, 180, 0.5); }
            50% { text-shadow: 0 0 40px rgba(255, 105, 180, 0.8), 0 0 80px rgba(255, 105, 180, 0.5); }
        }

        .subtitle {
            font-size: 1.8em;
            color: #fff;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .description {
            font-size: 1.1em;
            color: #ccc;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
            line-height: 1.8;
        }

        .heart-divider {
            font-size: 2em;
            margin: 20px 0;
            animation: pulse 1.5s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .open-button {
            background: linear-gradient(45deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.3em;
            font-family: 'Noto Naskh Arabic', serif;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.4);
            position: relative;
            z-index: 1;
            letter-spacing: 2px;
        }

        .open-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 105, 180, 0.6);
            background: linear-gradient(45deg, #ff1493, #ff69b4);
        }

        .open-button:active {
            transform: translateY(0);
        }

        /* کەنتێنەری ئەلبوم */
        .album-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .album-container.active {
            display: flex;
            opacity: 1;
        }

        .album-viewer {
            position: relative;
            width: 90%;
            max-width: 800px;
            height: 80vh;
            background: rgba(20, 20, 40, 0.9);
            border-radius: 20px;
            border: 2px solid rgba(255, 105, 180, 0.3);
            box-shadow: 0 0 50px rgba(255, 105, 180, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .album-header {
            padding: 15px;
            text-align: center;
            color: #ff69b4;
            font-size: 1.2em;
            border-bottom: 1px solid rgba(255, 105, 180, 0.2);
        }

        .photo-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            min-height: 300px;
        }

        .photo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }

        .photo.transitioning {
            opacity: 0;
            transform: scale(0.8) rotate(10deg);
        }

        .caption {
            text-align: center;
            padding: 20px;
            color: #fff;
            font-size: 1.2em;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid rgba(255, 105, 180, 0.2);
            transition: all 0.5s ease;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
        }

        .nav-btn {
            background: rgba(255, 105, 180, 0.2);
            color: white;
            border: 1px solid rgba(255, 105, 180, 0.5);
            padding: 12px 25px;
            font-size: 1em;
            font-family: 'Noto Naskh Arabic', serif;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: rgba(255, 105, 180, 0.4);
            transform: scale(1.05);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: white;
            font-size: 2em;
            cursor: pointer;
            z-index: 5;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            color: #ff69b4;
            transform: scale(1.2);
        }

        .page-indicator {
            text-align: center;
            color: #ff69b4;
            padding: 5px;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .title {
                font-size: 2em;
            }
            .subtitle {
                font-size: 1.3em;
            }
            .welcome-screen {
                padding: 30px 20px;
            }
            .open-button {
                padding: 15px 35px;
                font-size: 1.1em;
            }
            .album-viewer {
                width: 95%;
                height: 90vh;
            }
        }
    </style>
</head>
<body>
    <!-- ستارەکان -->
    <div class="stars" id="stars"></div>
    
    <!-- دڵە هەڵاوساوەکان -->
    <div class="floating-hearts" id="floatingHearts"></div>

    <!-- شاشەی بەخێرهاتن -->
    <div class="main-container">
        <div class="welcome-screen" id="welcomeScreen">
            <div class="heart-divider">💕 🌹 💕</div>
            <h1 class="title">رەیان گیان</h1>
            <h2 class="subtitle">کەسایەتی مەرگ</h2>
            <p class="description">جوان چاو زەیتوونەکەم<br>ئەمە ئەلبوومی من و تۆیە</p>
            <div class="heart-divider">💖 ✨ 💖</div>
            <button class="open-button" onclick="openAlbum()">
                💝 کلیک بکە بۆ کردنەوەی ئەلبوومەکە 💝
            </button>
        </div>
    </div>

    <!-- کەنتێنەری ئەلبوم -->
    <div class="album-container" id="albumContainer">
        <div class="album-viewer">
            <button class="close-btn" onclick="closeAlbum()">✕</button>
            <div class="album-header">💕 ئەلبوومی رەیان و فەرزاد 💕</div>
            <div class="photo-container">
                <img class="photo" id="currentPhoto" src="" alt="وێنەی ئەلبوم">
            </div>
            <div class="caption" id="photoCaption"></div>
            <div class="page-indicator" id="pageIndicator"></div>
            <div class="nav-buttons">
                <button class="nav-btn" id="prevBtn" onclick="prevPhoto()">⏮ پێشوو</button>
                <button class="nav-btn" id="nextBtn" onclick="nextPhoto()">دواتر ⏭</button>
            </div>
        </div>
    </div>

    <!-- یوتیوب پلەیەری شاراوە -->
    <div id="youtubePlayer" style="display: none;"></div>

    <script>
        // دروست کردنی ستارەکان
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 2 + 1) + 's';
                starsContainer.appendChild(star);
            }
        }

        // دروست کردنی دڵە هەڵاوساوەکان
        function createFloatingHearts() {
            const heartsContainer = document.getElementById('floatingHearts');
            const hearts = ['💕', '💖', '💗', '💝', '💘', '🌹', '✨', '💫'];
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('span');
                heart.className = 'floating-heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 8 + 's';
                heart.style.animationDuration = (Math.random() * 6 + 6) + 's';
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                heartsContainer.appendChild(heart);
            }
        }

        // وێنەکان و دەقەکان
        const photos = [
            {
                url: 'https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_6685.jpeg',
                caption: '💕 یەکەم دیدار، ئەو ساتەی دڵم بۆ هەمیشە بوو بە هی تۆ 💕'
            },
            {
                url: 'https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_7032.JPG',
                caption: '🌹 هەر نیگایەکت جیهانێک ئەوینم پێ دەبەخشێ 🌹'
            },
            {
                url: 'https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_7704.jpeg',
                caption: '✨ لە ناو چاوانتدا ئەستێرەکان دەبینم، رەیان گیان ✨'
            },
            {
                url: 'https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_7999.jpeg',
                caption: '💖 هەموو ساتێک لەگەڵ تۆدا وەک خەونێکی جوان وایه 💖'
            },
            {
                url: 'https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_8001.jpeg',
                caption: '💝 تۆ گوڵی بەهەشتی ژیانمی، چاو زەیتوونەکەم 💝'
            },
            {
                url: 'https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_8002.jpeg',
                caption: '🌟 جوانی تۆ لە هەموو شتێک زیاترە، کەسایەتی مەرگ 🌟'
            },
            {
                url: 'https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_8076.JPG',
                caption: '💗 دڵم بۆ تۆ لێدەدات، هەر لێدانێک ناوی تۆیە 💗'
            },
            {
                url: 'https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_8077.JPG',
                caption: '🌺 پێکەنینی تۆ گوڵستانێکە لە دڵمدا 🌺'
            },
            {
                url: 'https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_8078.JPG',
                caption: '💫 تۆ ئەو ئاواتەی کە هەموو ژیانم چاوەڕێم دەکرد 💫'
            },
            {
                url: 'https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_8090.JPG',
                caption: '🦋 ئەوینت باڵم پێ دەبەخشێ بۆ فڕین بەرەو ئاسۆی جوانی 🦋'
            },
            {
                url: 'https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_8097.jpeg',
                caption: '💎 تۆ نایابترین گەوهەری ژیانمی، رەیان 💎'
            }
        ];

        let currentIndex = 0;
        let audioPlayer = null;
        let isAudioPlaying = false;

        // فەنکشنی کردنەوەی ئەلبوم
        function openAlbum() {
            document.getElementById('welcomeScreen').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('albumContainer').classList.add('active');
                showPhoto(0);
                playMusic();
            }, 500);
        }

        // فەنکشنی داخستنی ئەلبوم
        function closeAlbum() {
            document.getElementById('albumContainer').classList.remove('active');
            document.getElementById('welcomeScreen').classList.remove('hidden');
            stopMusic();
        }

        // پیشاندانی وێنە
        function showPhoto(index) {
            currentIndex = index;
            const photo = document.getElementById('currentPhoto');
            const caption = document.getElementById('photoCaption');
            const pageIndicator = document.getElementById('pageIndicator');
            
            // ئەنمەیشنی گۆڕینی وێنە
            photo.classList.add('transitioning');
            
            setTimeout(() => {
                photo.src = photos[index].url;
                photo.alt = `وێنەی ${index + 1}`;
                caption.textContent = photos[index].caption;
                pageIndicator.textContent = `${index + 1} / ${photos.length}`;
                photo.classList.remove('transitioning');
            }, 300);

            // نوێکردنەوەی دوگمەکان
            document.getElementById('prevBtn').disabled = (index === 0);
            document.getElementById('nextBtn').disabled = (index === photos.length - 1);
        }

        // وێنەی پێشوو
        function prevPhoto() {
            if (currentIndex > 0) {
                showPhoto(currentIndex - 1);
            }
        }

        // وێنەی دواتر
        function nextPhoto() {
            if (currentIndex < photos.length - 1) {
                showPhoto(currentIndex + 1);
            }
        }

        // فەنکشنی پلەی موزیک (شاراوە)
        function playMusic() {
            if (isAudioPlaying) return;
            
            // دروست کردنی ئایفرەیمی یوتیوب بە شێوەی شاراوە
            const playerDiv = document.getElementById('youtubePlayer');
            playerDiv.innerHTML = `
                <iframe 
                    width="1" 
                    height="1" 
                    src="https://www.youtube.com/embed/v8St1xp_Ql4?autoplay=1&loop=1&playlist=v8St1xp_Ql4&controls=0&showinfo=0&rel=0&modestbranding=1" 
                    frameborder="0" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen>
                </iframe>
            `;
            isAudioPlaying = true;
        }

        // راگرتنی موزیک
        function stopMusic() {
            const playerDiv = document.getElementById('youtubePlayer');
            playerDiv.innerHTML = '';
            isAudioPlaying = false;
        }

        // کیبۆرد کۆنترۆڵ
        document.addEventListener('keydown', function(e) {
            if (document.getElementById('albumContainer').classList.contains('active')) {
                if (e.key === 'ArrowLeft') {
                    prevPhoto();
                } else if (e.key === 'ArrowRight') {
                    nextPhoto();
                } else if (e.key === 'Escape') {
                    closeAlbum();
                }
            }
        });

        // سویپ بۆ مۆبایل
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', function(e) {
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > 50 && document.getElementById('albumContainer').classList.contains('active')) {
                if (diff > 0) {
                    nextPhoto();
                } else {
                    prevPhoto();
                }
            }
        });

        // ئینیشیالیزەیشن
        window.onload = function() {
            createStars();
            createFloatingHearts();
        };
    </script>
</body>
</html>
