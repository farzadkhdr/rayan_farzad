<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ئەلبوومی من و تۆ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d050d;
            font-family: 'Noto Naskh Arabic', 'Segoe UI', cursive, sans-serif;
            direction: rtl;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .hero {
            text-align: center;
            z-index: 10;
            animation: fadeIn 2s ease;
            padding: 1rem;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f9d3e8, #ff8aae, #f9d3e8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 60px rgba(255, 80, 140, 0.4);
            line-height: 1.4;
        }

        .hero .sub {
            font-size: 1.2rem;
            color: #d4b0c4;
            margin-top: 0.5rem;
            opacity: 0.9;
            font-style: italic;
        }

        .open-btn {
            background: linear-gradient(135deg, #b03a6a, #7a2a4a);
            border: none;
            padding: 1rem 3.5rem;
            border-radius: 60px;
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff5f0;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(180, 40, 100, 0.6);
            transition: transform 0.3s, box-shadow 0.3s;
            font-family: inherit;
            margin: 1.5rem 0;
            border: 1px solid rgba(255, 200, 220, 0.3);
            z-index: 10;
        }

        .open-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 48px rgba(200, 50, 120, 0.8);
        }

        /* کاروسێل */
        .carousel-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #0a050a;
            z-index: 100;
            overflow: hidden;
        }

        .carousel-container.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .carousel-slide {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .carousel-slide img,
        .carousel-slide video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            animation: zoomIn 1s ease;
            background: #0a050a;
        }

        .carousel-caption {
            position: absolute;
            bottom: 10%;
            left: 0;
            right: 0;
            text-align: center;
            color: #f5e6f0;
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.9), 0 0 40px rgba(180, 40, 100, 0.5);
            padding: 1rem 2rem;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
            pointer-events: none;
            animation: fadeInUp 1.2s ease;
        }

        .carousel-control {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 150, 200, 0.2);
            color: white;
            font-size: 3rem;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            border-radius: 60px;
            transition: all 0.3s;
            z-index: 200;
            user-select: none;
        }

        .carousel-control:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-50%) scale(1.1);
        }

        .carousel-control.prev {
            left: 20px;
        }
        .carousel-control.next {
            right: 20px;
        }

        .carousel-counter {
            position: absolute;
            top: 20px;
            right: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 150, 200, 0.1);
            z-index: 200;
            font-family: sans-serif;
            direction: ltr;
        }

        .close-album {
            position: absolute;
            top: 20px;
            left: 30px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 150, 200, 0.2);
            color: white;
            font-size: 2rem;
            padding: 0.3rem 1.2rem;
            cursor: pointer;
            border-radius: 60px;
            transition: all 0.3s;
            z-index: 200;
            font-family: sans-serif;
        }

        .close-album:hover {
            background: rgba(255, 50, 50, 0.3);
            transform: scale(1.05);
        }

        .music-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #b080a0;
            font-size: 0.8rem;
            opacity: 0.6;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 16px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 150, 200, 0.1);
            z-index: 300;
            direction: ltr;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .music-indicator span {
            display: inline-block;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0%,100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes zoomIn {
            0% { opacity: 0; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 600px) {
            .hero h1 { font-size: 2.2rem; }
            .open-btn { font-size: 1.2rem; padding: 0.8rem 2.2rem; }
            .carousel-caption { font-size: 1.2rem; bottom: 8%; padding: 0.8rem; }
            .carousel-control { font-size: 2rem; padding: 0.3rem 0.8rem; }
            .carousel-control.prev { left: 8px; }
            .carousel-control.next { right: 8px; }
        }
    </style>
</head>
<body>

    <div class="hero" id="heroSection">
        <h1>✨ ئەلبوومی من و تۆ ✨</h1>
        <p class="sub">ڕەیان جیان... چاو زەیتوونەکەم، ئەمە هی من و تۆیە</p>
        <button class="open-btn" id="openAlbumBtn">📖 کلیک بکە بۆ کردنەوەی ئەلبوومەکە</button>
    </div>

    <div class="carousel-container" id="carouselContainer">
        <button class="close-album" id="closeAlbumBtn">✕</button>
        <div class="carousel-counter" id="counter">1 / 1</div>

        <button class="carousel-control prev" id="prevBtn">‹</button>
        <div class="carousel-slide" id="carouselSlide">
            <img id="slideMedia" src="" alt="وێنە" />
            <div class="carousel-caption" id="slideCaption">💫 وتەی ئاشقانە</div>
        </div>
        <button class="carousel-control next" id="nextBtn">›</button>

        <div class="music-indicator">
            <span>🎵</span> گۆرانی خۆشەویستی لە پشتەوە
        </div>
    </div>

    <script>
        // --------------------------------------------------
        // ١. هەموو فایلەکان (وێنە + ڤیدیۆ)
        // --------------------------------------------------
        const allFiles = [
            "23134050-D87E-4770-8CCA-03...",
            "4B28EFBF-54E7-45EA-8A1A-A5...",
            "6000B0A4-B57B-4981-B107-01D...",
            "71F3244A-0559-4C56-A4F6-E0...",
            "7433172290352266552.mov",
            "A8C88C7E-0488-4891-849C-6E...",
            "A8C88C7E-0488-4891-84C9-6E...",
            "E9C0CB32-CF8D-4F0D-9189-62...",
            "IMG_6685.jpeg",
            "IMG_7032.JPG",
            "IMG_7704.jpeg",
            "IMG_7999.jpeg",
            "IMG_8001.jpeg",
            "IMG_8002.jpg",
            "IMG_8076.JPG"
        ];

        // پاڵاوتن بۆ وێنە و ڤیدیۆ (هەموو ئەوانەی پاشگری دروستیان هەیە)
        const mediaFiles = allFiles.filter(f =>
            f.match(/\.(jpeg|jpg|png|gif|webp|mov|mp4|avi|mkv)$/i)
        );

        // --------------------------------------------------
        // ٢. وتە ئاشقانەکان (زیاتر بۆ وێنە زۆرەکان)
        // --------------------------------------------------
        const loveQuotes = [
            "ڕەیان جیان، دڵم بۆ تۆ لێدەدات",
            "چاو زەیتوونەکەم، جوانیی جیهان",
            "تۆ هەموو شیعرەکانی منیت",
            "ئەم ڕۆژانە بە تۆ جوانن",
            "بۆ هەمیشە، من و تۆ",
            "خۆشەویستی بێ کۆتا",
            "تۆ وەک مانگێکی شەوی تاریک",
            "دڵم تەنها بۆ تۆ دەلرزێت",
            "هەموو وێنەیەک بیرۆکەیەکە لە تۆ",
            "ئەم ساتانە بۆ تۆن",
            "تۆ هەموو خەونەکانمیت",
            "ڕۆژانە بە تۆ ڕووناکترن",
            "دەستم بگرە بۆ هەمیشە",
            "تۆ هۆکاری زەردەخەنەی منیت",
            "تۆ ھەستی ژیانمیت",
            "هەر هەناسەیەک بۆ تۆ",
            "تۆ جوانترین خەونمیت",
            "دڵم بۆ تۆ دەڕوات",
            "تۆ هەموو جیهانمیت",
            "بە تۆ ژیان جوانە"
        ];

        // --------------------------------------------------
        // ٣. کاروسێل
        // --------------------------------------------------
        let currentIndex = 0;
        const slideMedia = document.getElementById('slideMedia');
        const slideCaption = document.getElementById('slideCaption');
        const counter = document.getElementById('counter');
        const container = document.getElementById('carouselContainer');
        const hero = document.getElementById('heroSection');

        // بۆ ئەوەی وێنەی دووبارە نەبێتەوە
        const uniqueMedia = [...new Set(mediaFiles)];

        function showSlide(index) {
            if (uniqueMedia.length === 0) return;

            if (index < 0) index = uniqueMedia.length - 1;
            if (index >= uniqueMedia.length) index = 0;

            currentIndex = index;
            const file = uniqueMedia[currentIndex];
            const caption = loveQuotes[currentIndex % loveQuotes.length];
            const isVideo = /\.(mov|mp4|avi|mkv)$/i.test(file);

            // دروستکردنی تەگی دروست (img یان video)
            const parent = slideMedia.parentNode;
            const newMedia = isVideo ? document.createElement('video') : document.createElement('img');

            newMedia.src = `n/${file}`;
            newMedia.alt = caption;
            if (isVideo) {
                newMedia.muted = true;
                newMedia.autoplay = false;
                newMedia.controls = false;
                newMedia.loop = true;
                newMedia.style.width = '100%';
                newMedia.style.height = '100%';
                newMedia.style.objectFit = 'contain';
                // ڤیدیۆ خۆکار پلەی ناکات، بەڵام دەتوانیت کرتە بکەیت بۆ پلەی
                newMedia.addEventListener('click', () => {
                    if (newMedia.paused) newMedia.play();
                    else newMedia.pause();
                });
            }

            // جێگۆڕکێی تەگی کۆن
            parent.replaceChild(newMedia, slideMedia);

            // نوێکردنەوەی گۆڕاوەکە
            window.slideMedia = newMedia;

            slideCaption.textContent = `💫 ${caption}`;
            counter.textContent = `${currentIndex + 1} / ${uniqueMedia.length}`;

            // ئەنیمەیشن
            newMedia.style.animation = 'none';
            slideCaption.style.animation = 'none';
            requestAnimationFrame(() => {
                newMedia.style.animation = 'zoomIn 0.8s ease';
                slideCaption.style.animation = 'fadeInUp 0.8s ease';
            });

            // ئەگەر ڤیدیۆیە، پلەی بکە
            if (isVideo) {
                newMedia.play().catch(() => {});
            }
        }

        // --------------------------------------------------
        // ٤. کۆنتڕۆڵەکان
        // --------------------------------------------------
        document.getElementById('prevBtn').addEventListener('click', () => {
            showSlide(currentIndex - 1);
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            showSlide(currentIndex + 1);
        });

        document.addEventListener('keydown', (e) => {
            if (!container.classList.contains('active')) return;
            if (e.key === 'ArrowLeft') showSlide(currentIndex - 1);
            if (e.key === 'ArrowRight') showSlide(currentIndex + 1);
            if (e.key === 'Escape') closeAlbum();
        });

        // --------------------------------------------------
        // ٥. کردنەوە و داخستن
        // --------------------------------------------------
        let audioPlayer = null;
        let autoSlideInterval = null;

        function openAlbum() {
            container.classList.add('active');
            hero.style.display = 'none';
            document.body.style.overflow = 'hidden';

            if (uniqueMedia.length > 0) {
                showSlide(0);
            }

            // گۆرانی Khodahafezi لە یوتیوب (تەنها دەنگ)
            if (!audioPlayer) {
                audioPlayer = document.createElement('iframe');
                audioPlayer.src = 'https://www.youtube.com/embed/v8St1xp_Ql4?autoplay=1&loop=1&playlist=v8St1xp_Ql4&controls=0&showinfo=0&rel=0&iv_load_policy=3&modestbranding=1&disablekb=1&fs=0&cc_load_policy=0&widgetid=1&enablejsapi=1';
                audioPlayer.style.position = 'absolute';
                audioPlayer.style.width = '0';
                audioPlayer.style.height = '0';
                audioPlayer.style.border = '0';
                audioPlayer.style.opacity = '0';
                audioPlayer.style.pointerEvents = 'none';
                audioPlayer.allow = 'autoplay; encrypted-media';
                document.body.appendChild(audioPlayer);

                // هەوڵی پلەی کردنی خۆکار
                try {
                    audioPlayer.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                } catch(e) {}
            }

            if (autoSlideInterval) clearInterval(autoSlideInterval);
            autoSlideInterval = setInterval(() => {
                showSlide(currentIndex + 1);
            }, 6000);
        }

        function closeAlbum() {
            container.classList.remove('active');
            hero.style.display = 'block';
            document.body.style.overflow = 'auto';
            if (autoSlideInterval) {
                clearInterval(autoSlideInterval);
                autoSlideInterval = null;
            }
            // پلەی ڤیدیۆکە ڕابگرە
            if (window.slideMedia && window.slideMedia.tagName === 'VIDEO') {
                window.slideMedia.pause();
            }
        }

        document.getElementById('openAlbumBtn').addEventListener('click', openAlbum);
        document.getElementById('closeAlbumBtn').addEventListener('click', closeAlbum);

        // سوایپ
        let touchStartX = 0;
        let touchEndX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });
        document.addEventListener('touchend', (e) => {
            if (!container.classList.contains('active')) return;
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) showSlide(currentIndex + 1);
                else showSlide(currentIndex - 1);
            }
        });

        console.log(`💖 ئەلبوومی من و تۆ - ${uniqueMedia.length} وێنە و ڤیدیۆ ئامادەیە!`);
    </script>
</body>
</html>
