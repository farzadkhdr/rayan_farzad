<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ئەلبومی سلایدشۆ - گیت‌هاب</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a16;
            font-family: 'Noto Nastaliq Urdu', cursive;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slider-container {
            position: relative;
            width: 98vw;
            height: 95vh;
            max-width: 1400px;
            max-height: 900px;
            background: #111;
            border-radius: 30px;
            box-shadow: 0 0 60px rgba(180, 140, 80, 0.2);
            overflow: hidden;
            border: 2px solid #b8a07c44;
        }

        .slide {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
            justify-content: center;
            align-items: center;
            background: #0a0a16;
            animation: fadeIn 0.6s ease;
        }

        .slide.active {
            display: flex;
        }

        @keyframes fadeIn {
            0% { opacity: 0.3; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        .slide img,
        .slide video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #0a0a16;
            border-radius: 20px;
        }

        .slide video {
            background: #000;
        }

        /* تێکست لەسەر وێنە */
        .slide-text {
            position: absolute;
            bottom: 10%;
            left: 5%;
            right: 5%;
            background: linear-gradient(0deg, rgba(0,0,0,0.85) 20%, transparent 100%);
            color: #f5e6d3;
            font-size: 2.5rem;
            padding: 2.5rem 2rem 1.8rem;
            text-align: center;
            font-family: 'Noto Nastaliq Urdu', cursive;
            direction: rtl;
            text-shadow: 0 4px 30px #000000ee, 0 2px 10px #000;
            border-radius: 20px 20px 0 0;
            letter-spacing: 1px;
            line-height: 1.8;
            pointer-events: none;
        }

        .slide-text small {
            display: block;
            font-size: 1.4rem;
            opacity: 0.8;
            margin-top: 0.3rem;
        }

        /* دوگمەکانی گەڕان */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(20, 18, 30, 0.7);
            backdrop-filter: blur(10px);
            color: #f5e9d8;
            border: 1px solid #b8a07c55;
            font-size: 3rem;
            padding: 0.3rem 1.2rem;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
            z-index: 20;
            font-weight: 300;
            user-select: none;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
        }

        .nav-btn:hover {
            background: rgba(180, 140, 80, 0.3);
            border-color: #d4b48c;
            transform: translateY(-50%) scale(1.1);
            color: #fff;
        }

        .nav-btn.prev { left: 25px; }
        .nav-btn.next { right: 25px; }

        /* ژێرەوە: ژمارە و ناوی فایل */
        .footer-info {
            position: absolute;
            bottom: 18px;
            left: 0;
            right: 0;
            text-align: center;
            color: #b8a07c99;
            font-size: 1rem;
            font-family: 'Noto Nastaliq Urdu', cursive;
            letter-spacing: 1px;
            background: rgba(0,0,0,0.4);
            padding: 8px 0;
            backdrop-filter: blur(4px);
            border-radius: 0 0 30px 30px;
            pointer-events: none;
            z-index: 10;
        }

        .footer-info span {
            color: #d4b48c;
            font-weight: bold;
        }

        /* دۆخی مۆبایل */
        @media (max-width: 700px) {
            .slider-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                max-width: 100%;
                max-height: 100%;
            }
            .slide-text {
                font-size: 1.8rem;
                padding: 1.8rem 1.2rem 1.2rem;
                bottom: 15%;
            }
            .slide-text small {
                font-size: 1.1rem;
            }
            .nav-btn {
                font-size: 2.2rem;
                padding: 0.1rem 0.8rem;
            }
            .nav-btn.prev { left: 8px; }
            .nav-btn.next { right: 8px; }
            .footer-info { font-size: 0.8rem; }
        }

        /* دوگمەی پلەی/پۆز */
        .play-btn {
            position: absolute;
            bottom: 80px;
            right: 30px;
            background: rgba(20, 18, 30, 0.7);
            backdrop-filter: blur(10px);
            color: #f5e9d8;
            border: 1px solid #b8a07c55;
            border-radius: 50px;
            padding: 10px 22px;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 25;
            transition: all 0.3s;
            font-family: 'Noto Nastaliq Urdu', cursive;
        }

        .play-btn:hover {
            background: rgba(180, 140, 80, 0.3);
            border-color: #d4b48c;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="slider-container">
    <!-- سلایدەکان لە ڕێگەی جاڤاسکریپتەوە دروست دەکرێن -->
    <div id="slidesWrapper" style="width:100%; height:100%; position:relative;"></div>

    <!-- دوگمەکان -->
    <button class="nav-btn prev" id="prevBtn">‹</button>
    <button class="nav-btn next" id="nextBtn">›</button>

    <!-- دوگمەی پلەی/پۆز (بۆ ڤیدیۆ) -->
    <button class="play-btn" id="playToggleBtn">▶ پلەی</button>

    <!-- ژێرەوە -->
    <div class="footer-info" id="footerInfo">سلاید <span id="currentNum">1</span> لە <span id="totalNum">0</span></div>
</div>

<script>
    // 🔗 زانیارییەکانی گیت‌هاب
    const GITHUB_USER = 'farzadkhdr';
    const GITHUB_REPO = 'rayan_farzad';
    const GITHUB_BRANCH = 'main';
    const BASE_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/`;

    // 📂 لیستی فایلەکان (وێنە و ڤیدیۆ)
    // تکایە ناوەکان بە تەواوی وەک لە ریپۆستەرەکەتدا هەن بنووسە
    const mediaItems = [
        { file: '4B28EFBF-54E7-45EA-8A1A-A5BE1F2FF3F1.MP4', type: 'video', caption: 'ڤیدیۆی جوان', overlay: 'ساتێکی تایبەت لە ژیاندا' },
        { file: 'IMG_7032.JPG', type: 'image', caption: 'وێنەی یەکەم', overlay: 'ڕەنگی ژیان لەم چاوەوانەدا' },
        { file: 'IMG_8076.JPG', type: 'image', caption: 'وێنەی دووەم', overlay: 'خەیاڵی هەتا هەتایە' },
        { file: 'IMG_8077.JPG', type: 'image', caption: 'وێنەی سێیەم', overlay: 'تەماشای ڕووناکی بکە' },
        { file: 'IMG_8078.JPG', type: 'image', caption: 'وێنەی چوارەم', overlay: 'دڵت پڕ بکە لە خۆشەویستی' },
        { file: 'IMG_8079.JPG', type: 'image', caption: 'وێنەی پێنجەم', overlay: 'هەموو شتێک دەگۆڕێت، تۆ خۆت بمێنەوە' },
        // هەر چەندێکی تر زیاد بکە
    ];

    let currentIndex = 0;
    let slides = [];
    let videoElements = [];

    const wrapper = document.getElementById('slidesWrapper');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playToggleBtn = document.getElementById('playToggleBtn');
    const currentNum = document.getElementById('currentNum');
    const totalNum = document.getElementById('totalNum');

    // دروستکردنی سلایدەکان
    function buildSlides() {
        wrapper.innerHTML = '';
        slides = [];
        videoElements = [];

        mediaItems.forEach((item, index) => {
            const slideDiv = document.createElement('div');
            slideDiv.className = 'slide';
            if (index === 0) slideDiv.classList.add('active');

            const fileUrl = BASE_URL + encodeURIComponent(item.file);

            let mediaHtml = '';
            if (item.type === 'video') {
                mediaHtml = `
                    <video controls autoplay muted playsinline style="width:100%; height:100%; object-fit:contain; background:#000;">
                        <source src="${fileUrl}" type="video/mp4">
                        براوسەر پشتیوانی ڤیدیۆ ناکات
                    </video>
                `;
            } else {
                mediaHtml = `
                    <img src="${fileUrl}" alt="${item.caption}" loading="lazy" 
                         onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\"color:#b8a07c; font-size:2rem; text-align:center; padding:4rem;\">🖼️ وێنە دەستنایەت</div>';">
                `;
            }

            slideDiv.innerHTML = `
                ${mediaHtml}
                <div class="slide-text">
                    ${item.overlay}
                    <small>✨ ${item.caption}</small>
                </div>
            `;

            wrapper.appendChild(slideDiv);
            slides.push(slideDiv);

            // کۆکردنەوەی ڤیدیۆکان بۆ کۆنتڕۆڵی دەنگ
            const video = slideDiv.querySelector('video');
            if (video) {
                videoElements.push(video);
                // ڕێگەدان بە دەنگ (ئەگەر دەنگ هەبێت)
                video.muted = false;
                // خۆکار ناگەڕێت تا پلەی نەکرێت
                video.autoplay = false;
            }
        });

        totalNum.textContent = mediaItems.length;
        updateCounter();
    }

    // نوێکردنەوەی ژمارە
    function updateCounter() {
        currentNum.textContent = currentIndex + 1;
    }

    // گۆڕینی سلاید
    function goToSlide(index) {
        if (index < 0) index = slides.length - 1;
        if (index >= slides.length) index = 0;

        // وەستاندنی هەموو ڤیدیۆکان
        videoElements.forEach(v => {
            v.pause();
            v.currentTime = 0;
        });

        slides.forEach((s, i) => {
            s.classList.toggle('active', i === index);
        });

        currentIndex = index;
        updateCounter();

        // گەڕانەوەی ڤیدیۆی ئێستا
        const currentVideo = slides[index]?.querySelector('video');
        if (currentVideo) {
            playToggleBtn.textContent = '▶ پلەی';
        } else {
            playToggleBtn.textContent = '▶ پلەی';
        }
    }

    // پلەی/وەستان بۆ ڤیدیۆی ئێستا
    function togglePlay() {
        const currentSlide = slides[currentIndex];
        const video = currentSlide?.querySelector('video');
        if (!video) return;

        if (video.paused) {
            video.play();
            playToggleBtn.textContent = '⏸ وەستێنە';
        } else {
            video.pause();
            playToggleBtn.textContent = '▶ پلەی';
        }
    }

    // ڕووداوەکان
    prevBtn.addEventListener('click', () => goToSlide(currentIndex - 1));
    nextBtn.addEventListener('click', () => goToSlide(currentIndex + 1));
    playToggleBtn.addEventListener('click', togglePlay);

    // کلیلەکانی کیبۆرد
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') goToSlide(currentIndex - 1);
        if (e.key === 'ArrowRight') goToSlide(currentIndex + 1);
        if (e.key === ' ' || e.key === 'Space') {
            e.preventDefault();
            togglePlay();
        }
    });

    // بارکردن
    buildSlides();

    console.log('✅ ئەلبومی سلایدشۆ بە سەرکەوتوویی بارکرا!');
</script>

</body>
</html>
