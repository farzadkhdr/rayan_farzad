<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ئەلبومی ئەنیمیشنی وێنەکان</title>
    <!-- فۆنتی خەتاتی کوردی (ئەگەر بەکاربهێنیت) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet" />
    <style>
        /* ڕێکخستنی گشتی */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b0c1a, #1a1b2f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Noto Nastaliq Urdu', 'Segoe UI', cursive, sans-serif;
            padding: 2rem 1rem;
        }

        .album {
            max-width: 1300px;
            width: 100%;
        }

        .album h1 {
            text-align: center;
            font-size: 3.5rem;
            font-weight: 400;
            color: #f5e9d8;
            text-shadow: 0 0 20px #b8a07c, 0 0 40px #7a5f3a;
            letter-spacing: 4px;
            margin-bottom: 2.5rem;
            font-family: 'Noto Nastaliq Urdu', cursive;
            border-bottom: 2px solid #b8a07c55;
            padding-bottom: 0.7rem;
            animation: fadeGlow 3s infinite alternate;
        }

        @keyframes fadeGlow {
            0% { text-shadow: 0 0 10px #b8a07c88, 0 0 30px #7a5f3a66; }
            100% { text-shadow: 0 0 30px #f5e9d8cc, 0 0 60px #b8a07c; }
        }

        /* تۆڕی وێنەکان */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2.2rem 1.8rem;
            justify-items: center;
        }

        /* کارتی هەر وێنەیەک */
        .card {
            background: rgba(255, 245, 230, 0.07);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 40px 16px 40px 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 215, 150, 0.15);
            overflow: hidden;
            width: 100%;
            max-width: 340px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: cardGlow 4s infinite alternate;
            transform-style: preserve-3d;
            perspective: 800px;
        }

        .card:hover {
            transform: translateY(-16px) scale(1.02) rotateY(2deg) rotateX(2deg);
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.8), 0 0 0 2px #d4b48c;
        }

        @keyframes cardGlow {
            0% { box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,215,150,0.1); }
            100% { box-shadow: 0 20px 50px rgba(180, 140, 80, 0.3), 0 0 0 2px rgba(255, 215, 150, 0.4); }
        }

        /* چوارچێوەی وێنە */
        .image-wrapper {
            position: relative;
            overflow: hidden;
            background: #0a0a16;
            border-bottom: 3px solid #b8a07c66;
        }

        .image-wrapper img {
            display: block;
            width: 100%;
            height: 280px;
            object-fit: cover;
            transition: transform 0.8s ease, filter 0.6s ease;
            filter: brightness(0.85) saturate(1.1) contrast(1.05);
        }

        .card:hover .image-wrapper img {
            transform: scale(1.08) rotate(1.5deg);
            filter: brightness(1.1) saturate(1.3) contrast(1.1);
        }

        /* تێکستی خەتاتی لەسەر وێنە (ئەنیمیشن) */
        .overlay-text {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.8rem 1rem 1.2rem;
            background: linear-gradient(0deg, rgba(0,0,0,0.8) 20%, transparent 100%);
            color: #f5e6d3;
            font-size: 1.5rem;
            font-family: 'Noto Nastaliq Urdu', cursive;
            text-align: center;
            text-shadow: 0 4px 20px #000000ee, 0 2px 8px #000;
            letter-spacing: 1px;
            line-height: 1.6;
            transform: translateY(10px);
            opacity: 0.85;
            transition: all 0.6s ease;
            backdrop-filter: blur(2px);
            direction: rtl; /* بۆ کوردی */
        }

        .card:hover .overlay-text {
            transform: translateY(0);
            opacity: 1;
            background: linear-gradient(0deg, rgba(20,15,10,0.9) 30%, transparent 100%);
            font-size: 1.7rem;
            text-shadow: 0 0 30px #d4b48c, 0 0 60px #b8860b;
        }

        /* ناوی وێنە یان تێکستی خوارەوە */
        .caption {
            padding: 0.9rem 1.2rem 1.2rem;
            background: rgba(20, 18, 30, 0.7);
            backdrop-filter: blur(4px);
            color: #d4c5b0;
            font-size: 0.95rem;
            text-align: center;
            border-top: 1px solid #b8a07c33;
            font-family: 'Noto Nastaliq Urdu', cursive;
            direction: rtl;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            transition: background 0.4s;
        }

        .card:hover .caption {
            background: rgba(40, 32, 24, 0.8);
            color: #f5e9d8;
        }

        /* وەڵامگێڕی بچووک */
        @media (max-width: 600px) {
            .album h1 { font-size: 2.4rem; }
            .grid { gap: 1.5rem; }
            .image-wrapper img { height: 220px; }
            .overlay-text { font-size: 1.2rem; padding: 1rem 0.8rem; }
        }

        /* ئەنیمیشنی سەرەتایی بۆ کارتەکان */
        .card {
            opacity: 0;
            animation: cardEntry 0.9s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.25s; }
        .card:nth-child(3) { animation-delay: 0.4s; }
        .card:nth-child(4) { animation-delay: 0.55s; }
        .card:nth-child(5) { animation-delay: 0.7s; }
        .card:nth-child(6) { animation-delay: 0.85s; }
        .card:nth-child(7) { animation-delay: 1.0s; }
        .card:nth-child(8) { animation-delay: 1.15s; }

        @keyframes cardEntry {
            0% { opacity: 0; transform: translateY(60px) scale(0.9) rotateZ(-3deg); }
            100% { opacity: 1; transform: translateY(0) scale(1) rotateZ(0); }
        }
    </style>
</head>
<body>

<div class="album">
    <h1>📸 ئەلبومی وێنەکان</h1>
    <div class="grid" id="imageGrid">
        <!-- کارتەکان لە ڕێگەی جاڤاسکریپتەوە دروست دەکرێن -->
    </div>
</div>

<script>
    // 🖼️ لیستی وێنەکان (هەر وێنەیەک ناو و تێکستی تایبەتی خۆی هەیە)
    // تکایە ناوی فایلەکان و ڕێگایان (پات) بەپێی پرۆژەکەت ڕاست بکەوە
    const images = [
        { 
            src: 'wene1.jpg', 
            caption: 'خەیاڵی هەتا هەتایە', 
            overlay: 'ئەم ژیانە جوانە، تەماشای ڕووناکی بکە' 
        },
        { 
            src: 'wene2.jpg', 
            caption: 'ڕەنگی ژیان', 
            overlay: 'دڵت پڕ بکە لە خۆشەویستی' 
        },
        { 
            src: 'wene3.jpg', 
            caption: 'هەناسەی بەهار', 
            overlay: 'هەموو شتێک دەگۆڕێت، تۆ تەنها خۆت بمێنەوە' 
        },
        { 
            src: 'wene4.jpg', 
            caption: 'شەوی مانگەکە', 
            overlay: 'ئەستێرەکان بۆ تۆ دەگەشێنەوە' 
        },
        { 
            src: 'wene5.jpg', 
            caption: 'ڕێگای ژیان', 
            overlay: 'هەر هەنگاوێک چیرۆکێکی تازە' 
        },
        { 
            src: 'wene6.jpg', 
            caption: 'ئاوێنەی دڵ', 
            overlay: 'خۆشەویستی بەسەر هەموو شتێکدا زاڵە' 
        },
        // زیاتر زیاد بکە بە هەمان شێوە
    ];

    const grid = document.getElementById('imageGrid');

    // بە خولگەیی هەر وێنەیەک بکە بە کارتێک
    images.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'card';

        // ناوەڕۆکی کارت
        card.innerHTML = `
            <div class="image-wrapper">
                <img src="${item.src}" alt="${item.caption}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <div class="overlay-text">${item.overlay}</div>
            </div>
            <div class="caption">✨ ${item.caption}</div>
        `;

        // ئەگەر وێنە بارنەبوو، پەیامی جێگرەوە پیشان بدە
        const img = card.querySelector('img');
        img.addEventListener('error', function() {
            this.style.display = 'none';
            const overlay = this.parentElement.querySelector('.overlay-text');
            if (overlay) {
                overlay.style.display = 'block';
                overlay.textContent = '🖼️ وێنە دەستنایەت';
            }
        });

        grid.appendChild(card);
    });

    // ڕەوشتی ئەنیمیشنی زیادە بۆ خولگەیی کارتەکان دوای بارکردن
    console.log('ئەلبومی ئەنیمیشنی وێنەکان بە سەرکەوتوویی بارکرا ✅');
</script>

</body>
</html>
