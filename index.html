<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕەیان - ئەلبوومی من و تۆ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Naskh Arabic', serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 25%, #ffa5a5 50%, #ffb8b8 75%, #ffd4d4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* پەڕەی سەرەتا */
        .intro-page {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            animation: fadeIn 2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-size: 3.5em;
            color: #8b0000;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .subtitle {
            font-size: 1.5em;
            color: #5c0000;
            margin-bottom: 50px;
            font-style: italic;
        }

        .heart {
            font-size: 4em;
            animation: heartbeat 1.5s infinite;
            display: block;
            margin: 20px 0;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }

        .enter-btn {
            background: linear-gradient(45deg, #ff4757, #ff6348);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 1.8em;
            font-family: 'Noto Naskh Arabic', serif;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 71, 87, 0.4);
            margin-top: 20px;
        }

        .enter-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 71, 87, 0.6);
        }

        /* پەڕەی ئەلبوم */
        .album-page {
            display: none;
            width: 100%;
            min-height: 100vh;
            padding: 20px;
        }

        .album-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            height: 80vh;
            perspective: 1500px;
        }

        .album {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #ffe0e0, #ffcccc);
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-card {
            position: absolute;
            width: 70%;
            height: 70%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0;
            transform: scale(0.8) rotateY(90deg);
        }

        .photo-card.active {
            opacity: 1;
            transform: scale(1) rotateY(0deg);
        }

        .photo-card img {
            max-width: 100%;
            max-height: 60%;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .photo-caption {
            font-size: 1.4em;
            color: #8b0000;
            text-align: center;
            line-height: 1.8;
            font-family: 'Noto Naskh Arabic', serif;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.8);
            border: none;
            font-size: 3em;
            cursor: pointer;
            padding: 20px;
            border-radius: 50%;
            transition: all 0.3s ease;
            z-index: 10;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff4757;
            backdrop-filter: blur(5px);
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.95);
            transform: translateY(-50%) scale(1.1);
        }

        .prev-btn {
            left: 20px;
        }

        .next-btn {
            right: 20px;
        }

        .counter {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #8b0000;
            font-size: 1.2em;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px 25px;
            border-radius: 25px;
            backdrop-filter: blur(5px);
        }

        .music-note {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2em;
            animation: float 3s infinite;
            opacity: 0.8;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(15deg); }
        }

        .hidden {
            display: none;
        }

        .visible {
            display: block;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2em;
            }
            .photo-card {
                width: 85%;
                height: 65%;
            }
            .nav-btn {
                font-size: 2em;
                width: 50px;
                height: 50px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- پەڕەی سەرەتا -->
    <div id="introPage" class="intro-page visible">
        <div class="heart">💝</div>
        <h1 class="title">
            ڕەیان<br>
            جیان کەسیاتی مەرگ<br>
            جوان چاو زەیتوونەکەم<br>
            ئەمە ئەلبوومی من و تۆیە
        </h1>
        <p class="subtitle">💕 هەموو ساتەکانی ژیانم لەگەڵ تۆدا 💕</p>
        <button class="enter-btn" onclick="openAlbum()">
            💝 کلیک بکە بۆ کردنەوەی ئەلبوومەکە 💝
        </button>
    </div>

    <!-- پەڕەی ئەلبوم -->
    <div id="albumPage" class="album-page hidden">
        <div class="album-container">
            <button class="nav-btn prev-btn" onclick="changePhoto(-1)">❮</button>
            <div class="album">
                <div class="music-note">🎵</div>
                <div class="photo-card active" id="photoCard">
                    <img id="currentPhoto" src="" alt="وێنەی ئەلبوم">
                    <div class="photo-caption" id="photoCaption"></div>
                </div>
                <div class="counter" id="counter"></div>
            </div>
            <button class="nav-btn next-btn" onclick="changePhoto(1)">❯</button>
        </div>
    </div>

    <script>
        // وێنەکان بە ناوی ڕاستەقینەیان
        const photos = [
            {
                url: "https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/23134050-D87E-4770-8CCA-0381AD045A99.jpeg",
                caption: "تۆ جوانترین بەشی ژیانمی 💕"
            },
            {
                url: "https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/71F3244A-0559-4C56-A4F6-E0D49A93BC84.JPEG",
                caption: "هەر کاتێ تۆم دیت، دڵم ڕادەکشێت 🥰"
            },
            {
                url: "https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_6685.jpeg",
                caption: "تۆ خۆشترین نھێنی ژیانمی 💝"
            },
            {
                url: "https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_7032.JPG",
                caption: "چاوت ئەستێرەی ئاسمانی منن ✨"
            },
            {
                url: "https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_7704.jpeg",
                caption: "دەستم بگرە و ھەرگیز مەھێڵە 💑"
            },
            {
                url: "https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_7999.jpeg",
                caption: "هەناسەکانم بە ناوی تۆوە دەدەم 🌹"
            },
            {
                url: "https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_8001.jpeg",
                caption: "تۆ بەهەشتی منیت لەسەر زەوی 💖"
            },
            {
                url: "https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_8002.jpeg",
                caption: "خەندەکانت جوانترین ئاوازی ژیانن 🎵"
            },
            {
                url: "https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_8076.JPG",
                caption: "لە تەنیشت تۆدا، کات ڕادەوەستێت ⏰"
            },
            {
                url: "https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_8077.JPG",
                caption: "تۆ نەخشەکەی دڵمی 💝"
            },
            {
                url: "https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_8078.JPG",
                caption: "هەموو ڕۆژێک لەگەڵ تۆدا جەژنە 🎉"
            },
            {
                url: "https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_8090.JPG",
                caption: "تۆ خەونی منی کە بوویتە ڕاستی ✨"
            },
            {
                url: "https://raw.githubusercontent.com/farzadkhdr/rayan_farzad/main/n/IMG_8097.jpeg",
                caption: "دڵم بۆ تۆ لێدەدات، ئەمڕۆ و هەتاهەتایە 💗"
            }
        ];

        let currentIndex = 0;
        let audioPlayer = null;

        // کردنەوەی ئەلبوم و دەستپێکردنی موزیک
        function openAlbum() {
            document.getElementById('introPage').classList.remove('visible');
            document.getElementById('introPage').classList.add('hidden');
            document.getElementById('albumPage').classList.remove('hidden');
            document.getElementById('albumPage').classList.add('visible');
            
            // دروستکردنی پلەیەری دەنگی بە شێوەیەکی شاراوە
            if (!audioPlayer) {
                audioPlayer = document.createElement('iframe');
                audioPlayer.style.display = 'none';
                audioPlayer.width = '0';
                audioPlayer.height = '0';
                audioPlayer.src = 'https://www.youtube.com/embed/v8St1xp_Ql4?autoplay=1&loop=1&playlist=v8St1xp_Ql4&controls=0&showinfo=0&rel=0';
                audioPlayer.allow = 'autoplay';
                document.body.appendChild(audioPlayer);
            }
            
            showPhoto(0);
        }

        // پیشاندانی وێنە
        function showPhoto(index) {
            const photoCard = document.getElementById('photoCard');
            const currentPhoto = document.getElementById('currentPhoto');
            const photoCaption = document.getElementById('photoCaption');
            const counter = document.getElementById('counter');
            
            // ئەنیمەیشنی گۆڕینی وێنە
            photoCard.style.transform = 'scale(0.8) rotateY(-90deg)';
            photoCard.style.opacity = '0';
            
            setTimeout(() => {
                currentPhoto.src = photos[index].url;
                currentPhoto.onerror = function() {
                    // ئەگەر وێنەکە نەدۆزرایەوە
                    this.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjMwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZmZlMGUwIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIyMCIgZmlsbD0iI2ZmNDc1NyIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPldlbmV5IExhZblx1MDBmMzwvdGV4dD48L3N2Zz4=';
                    photoCaption.textContent = 'وێنەکە نەدۆزرایەوە، تکایە لینکەکە بپشکنە 🥺';
                };
                photoCaption.textContent = photos[index].caption;
                counter.textContent = `${index + 1} / ${photos.length}`;
                
                photoCard.style.transform = 'scale(1) rotateY(0deg)';
                photoCard.style.opacity = '1';
            }, 400);
            
            currentIndex = index;
        }

        // گۆڕینی وێنەکان
        function changePhoto(direction) {
            let newIndex = currentIndex + direction;
            
            if (newIndex >= photos.length) {
                newIndex = 0;
            } else if (newIndex < 0) {
                newIndex = photos.length - 1;
            }
            
            showPhoto(newIndex);
        }

        // گۆڕینی خۆکارانەی وێنەکان هەموو 5 چرکە جارێک
        setInterval(() => {
            if (document.getElementById('albumPage').classList.contains('visible')) {
                changePhoto(1);
            }
        }, 5000);

        // کۆنتڕۆڵ بە کیبۆرد
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('albumPage').classList.contains('visible')) {
                if (e.key === 'ArrowRight') {
                    changePhoto(1);
                } else if (e.key === 'ArrowLeft') {
                    changePhoto(-1);
                }
            }
        });
    </script>
</body>
</html>
