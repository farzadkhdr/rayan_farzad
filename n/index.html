<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ئەلبوومی من و تۆ</title>
    <!-- ڕێکخستنی فۆنتی کوردی -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        /* ڕێکخستنی گشتی */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a0b1a;
            background-image: radial-gradient(circle at 20% 30%, #3d1f3d 0%, #0d050d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Naskh Arabic', 'Segoe UI', cursive, sans-serif;
            padding: 1.5rem;
            color: #f5e6f0;
            direction: rtl;
        }

        /* سەرپەڕە - ناو و پەیامەکە */
        .hero {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeIn 2s ease;
        }

        .hero h1 {
            font-size: 3.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f9d3e8, #ff8aae, #f9d3e8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(255, 80, 140, 0.3);
            letter-spacing: 2px;
            line-height: 1.4;
        }

        .hero .sub {
            font-size: 1.1rem;
            color: #d4b0c4;
            margin-top: 0.5rem;
            opacity: 0.8;
            font-style: italic;
        }

        /* دوگمەی کردنەوەی ئەلبووم */
        .open-btn {
            background: linear-gradient(135deg, #b03a6a, #7a2a4a);
            border: none;
            padding: 1rem 3.5rem;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff5f0;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(180, 40, 100, 0.5);
            transition: transform 0.3s, box-shadow 0.3s;
            font-family: inherit;
            margin: 1.5rem 0 2rem;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 200, 220, 0.3);
        }

        .open-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 48px rgba(200, 50, 120, 0.7);
        }

        /* شوێنی ئەلبوومەکە (لە سەرەتادا شاراوەیە) */
        .album-wrapper {
            display: none;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeInUp 1s ease;
        }

        .album-wrapper.active {
            display: block;
        }

        /* ڕیزکردنی وێنەکان بە شێوەی کارتی جوان */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.8rem;
            margin-top: 1.5rem;
        }

        /* هەر کارتێک */
        .card {
            background: rgba(40, 20, 35, 0.7);
            backdrop-filter: blur(6px);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 150, 200, 0.15);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s;
            animation: cardGlow 4s infinite alternate;
        }

        .card:hover {
            transform: translateY(-12px) scale(1.01);
            box-shadow: 0 20px 60px rgba(200, 50, 130, 0.4);
        }

        .card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
            transition: transform 0.6s;
        }

        .card:hover img {
            transform: scale(1.03);
        }

        /* تیکستی خوارەوەی هەر وێنەیەک */
        .card .caption {
            padding: 1.2rem 1.2rem 1.5rem;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 400;
            color: #f2dce8;
            background: linear-gradient(0deg, rgba(20, 8, 18, 0.9), transparent);
            line-height: 1.8;
            letter-spacing: 0.3px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid rgba(255, 150, 200, 0.1);
        }

        /* ئەنیمەیشنەکان */
        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes cardGlow {
            0% { box-shadow: 0 8px 30px rgba(180, 40, 100, 0.2); }
            100% { box-shadow: 0 8px 50px rgba(220, 60, 140, 0.6); }
        }

        /* ڕەسپۆنسیڤ بۆ مۆبایل */
        @media (max-width: 600px) {
            .hero h1 { font-size: 2.2rem; }
            .open-btn { font-size: 1.2rem; padding: 0.8rem 2.2rem; }
            .album-grid { grid-template-columns: 1fr 1fr; gap: 1rem; }
            .card img { height: 180px; }
            .card .caption { font-size: 0.9rem; padding: 0.8rem; min-height: 60px; }
        }

        @media (max-width: 450px) {
            .album-grid { grid-template-columns: 1fr; }
        }

        /* شێوازی پەڕەکە لە کاتێکدا گۆرانی دەنگ دەدات (نیشانەی پلەی بەک) */
        .music-indicator {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #b080a0;
            font-size: 0.8rem;
            opacity: 0.6;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 6px 14px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,150,200,0.1);
            pointer-events: none;
            direction: ltr;
        }
        .music-indicator span {
            display: inline-block;
            animation: pulse 1.8s infinite;
        }
        @keyframes pulse {
            0%,100%{ opacity:0.3; } 50%{ opacity:1; }
        }
    </style>
</head>
<body>

    <!-- سەرەتا: ناو و پەیامی تایبەت -->
    <div class="hero">
        <h1>✨ ئەلبوومی من و تۆ ✨</h1>
        <p class="sub">ڕەیان جیان... چاو زەیتوونەکەم، ئەمە هی من و تۆیە</p>
    </div>

    <!-- دوگمە بۆ کردنەوەی ئەلبووم -->
    <button class="open-btn" id="openAlbumBtn">📖 کلیک بکە بۆ کردنەوەی ئەلبوومەکە</button>

    <!-- ئەلبوومەکە (لە سەرەتادا شاراوەیە) -->
    <div class="album-wrapper" id="albumWrapper">
        <div class="album-grid" id="albumGrid"></div>
    </div>

    <!-- نیشانەی پلەی بەکی گۆرانی -->
    <div class="music-indicator">
        <span>🎵</span> گۆرانی خۆشەویستی لە پشتەوە دەنگ دەدات
    </div>

    <script>
        // --------------------------------------------------
        // ١. لیستی وێنەکان (تەنها ناوەکانی فایل لە فۆڵدەری n/)
        // --------------------------------------------------
        const imageFiles = [
            "23134050-D87E-4770-8CCA-03...",
            "4B28EFBF-54E7-45EA-8A1A-A5...",
            "6000B0A4-B57B-4981-B107-01D...",
            "71F3244A-0559-4C56-A4F6-E0...",
            "A8C88C7E-0488-4891-849C-6E...",
            "A8C88C7E-0488-4891-84C9-6E...",
            "E9C0CB32-CF8D-4F0D-9189-62...",
            "IMG_6685.jpeg",
            "IMG_7032.JPG",
            "IMG_7704.jpeg",
            "IMG_7999.jpeg",
            "IMG_8001.jpeg",
            "IMG_8002.jpg",
            "IMG_8076.JPG"
        ];

        // پاڵاوتن بۆ تەنها فایلەکانی وێنە (بەپێی پاشگر)
        const images = imageFiles.filter(f =>
            f.match(/\.(jpeg|jpg|png|gif|webp)$/i)
        );

        // --------------------------------------------------
        // ٢. لیستی وتە ئاشقانەکان (بۆ هەر وێنەیەک)
        // --------------------------------------------------
        const loveQuotes = [
            "ڕەیان جیان، دڵم بۆ تۆ لێدەدات",
            "چاو زەیتوونەکەم، جوانیی جیهان",
            "تۆ هەموو شیعرەکانی منیت",
            "ئەم ڕۆژانە بە تۆ جوانن",
            "بۆ هەمیشە، من و تۆ",
            "خۆشەویستی بێ کۆتا",
            "تۆ وەک مانگێکی شەوی تاریک",
            "دڵم تەنها بۆ تۆ دەلرزێت",
            "هەموو وێنەیەک بیرۆکەیەکە لە تۆ",
            "ئەم ساتانە بۆ تۆن",
            "تۆ هەموو خەونەکانمیت",
            "ڕۆژانە بە تۆ ڕووناکترن",
            "دەستم بگرە بۆ هەمیشە",
            "تۆ هۆکاری زەردەخەنەی منیت"
        ];

        // --------------------------------------------------
        // ٣. دروستکردنی کارتەکان بە وێنە و وتەی تایبەت
        // --------------------------------------------------
        const grid = document.getElementById('albumGrid');

        // بۆ ئەوەی وێنەی دوبارە نەبێتەوە، تەنها یەک جار هەر وێنەیەک دادەنێین
        // بەڵام ئەگەر چەند وێنەی هاوشێوە هەبوو، دەتوانی پاڵاوتنێکی تر زیاد بکەیت
        const uniqueImages = [...new Set(images)];

        // ئەگەر وێنەمان کەمتر بوو لە وتە، وتەکان دووبارە بکەوە
        const getQuote = (index) => {
            return loveQuotes[index % loveQuotes.length];
        };

        uniqueImages.forEach((file, idx) => {
            const card = document.createElement('div');
            card.className = 'card';

            // ڕێڕەوی وێنە (لە فۆڵدەری n/)
            const imgPath = `n/${file}`;

            // وتەی تایبەت بۆ ئەم وێنەیە
            const captionText = getQuote(idx);

            card.innerHTML = `
                <img src="${imgPath}" alt="${captionText}" loading="lazy" />
                <div class="caption">💫 ${captionText}</div>
            `;

            grid.appendChild(card);
        });

        // --------------------------------------------------
        // ٤. کارکردنی دوگمە و گۆرانی پشتەوە
        // --------------------------------------------------
        const openBtn = document.getElementById('openAlbumBtn');
        const wrapper = document.getElementById('albumWrapper');

        // ئۆبجێکتی ئەمپڵی گۆرانی (بەبێ دیاربوونی ڤیدیۆ)
        let audioPlayer = null;

        openBtn.addEventListener('click', function() {
            // پیشاندانی ئەلبوومەکە
            wrapper.classList.add('active');

            // گۆڕینی دوگمە بۆ "کراوە"
            this.textContent = '💖 ئەلبوومەکە کرایەوە';
            this.style.opacity = '0.6';
            this.style.cursor = 'default';
            this.disabled = true;

            // دروستکردنی پلەی بەکی گۆرانی لە یوتیوب (تەنها دەنگ)
            // بەکارهێنانی iframe‌ی یوتیوب بە شێوەی "پارامەترەکانی پشتەوە"
            if (!audioPlayer) {
                audioPlayer = document.createElement('iframe');
                audioPlayer.src = 'https://www.youtube.com/embed/R2y_X9qNNrc?autoplay=1&loop=1&playlist=R2y_X9qNNrc&controls=0&showinfo=0&rel=0&iv_load_policy=3&modestbranding=1&disablekb=1&fs=0&cc_load_policy=0&widgetid=1&enablejsapi=1';
                audioPlayer.style.position = 'absolute';
                audioPlayer.style.width = '0';
                audioPlayer.style.height = '0';
                audioPlayer.style.border = '0';
                audioPlayer.style.opacity = '0';
                audioPlayer.style.pointerEvents = 'none';
                audioPlayer.allow = 'autoplay; encrypted-media';
                document.body.appendChild(audioPlayer);

                // هەوڵی پلەی کردنی خۆکار بە JS (ئەگەر مۆڵەت درا)
                try {
                    audioPlayer.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                } catch(e) {
                    // ئەگەر بلاک کرا، دەنگی پشتەوە بەم شێوەیە کار دەکات
                }
            }
        });

        // --------------------------------------------------
        // ٥. گۆڕینی وێنەکان بە شێوەی خۆکار (سلایدشۆ)
        // --------------------------------------------------
        let slideIndex = 0;
        const cards = document.querySelectorAll('.card');

        function autoSlide() {
            if (cards.length === 0) return;

            // هەموو کارتەکان بشارەوە
            cards.forEach((card, i) => {
                card.style.display = 'none';
            });

            // ٣ کارت پیشان بدە (یەک لە دوای یەک)
            for (let i = 0; i < 3; i++) {
                const index = (slideIndex + i) % cards.length;
                cards[index].style.display = 'block';
                // ئەنیمەیشنی فەید بۆ هەر کارتێک
                cards[index].style.animation = 'fadeIn 0.8s ease';
            }

            slideIndex = (slideIndex + 1) % cards.length;
        }

        // دوای کردنەوەی ئەلبووم، سلایدشۆ دەست پێ بکات
        // چاودێری کردنەوەی ئەلبووم بکە
        const observer = new MutationObserver(() => {
            if (wrapper.classList.contains('active')) {
                // دەستپێکردنی سلایدشۆ
                autoSlide();
                setInterval(autoSlide, 4000); // هەر ٤ چرکە جارێک
                observer.disconnect(); // ڕابگرە دوای جارێک
            }
        });
        observer.observe(wrapper, { attributes: true, attributeFilter: ['class'] });

        // ئەگەر ئەلبووم پێشتر کرابووەوە (بۆ هەر حاڵەتێک)
        if (wrapper.classList.contains('active')) {
            autoSlide();
            setInterval(autoSlide, 4000);
        }

        // --------------------------------------------------
        // ٦. ڕێگری لە دووبارەبوونەوەی وێنەکان (خۆکار)
        // --------------------------------------------------
        // سەرەتا هەموو کارتەکان پیشان بدە بەڵام سلایدشۆ تەنها ٣ کارت پیشان دەدات
        // بۆیە لە سەرەتاوە هەموویان دیارن، دواتر سلایدشۆ کار دەکات
        // بۆ چارەسەری ئەمە، سەرەتا هەموویان بشارەوە
        window.addEventListener('load', function() {
            // ئەگەر ئەلبووم کرابووەوە، سلایدشۆ کار دەکات
            if (wrapper.classList.contains('active')) {
                cards.forEach(c => c.style.display = 'none');
                autoSlide();
                setInterval(autoSlide, 4000);
            } else {
                // تا ئەلبووم نەکراوەتەوە، هەموویان دیارن (بەڵام دواتر سلایدشۆ دەستی پێ دەکات)
                // بۆ ئەوەی کاتێک کرایەوە، کارتەکان بە ڕێکی سلاید بکەن
                cards.forEach(c => c.style.display = 'block');
            }
        });

        console.log('💖 ئەلبوومی من و تۆ ئامادەیە!');
    </script>
</body>
</html>
